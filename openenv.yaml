name: "careernav-env"
version: "1.0.0"
description: "A real-time OpenEnv-compliant environment where an AI acts as a career coach for CS students in India."
author: "Harikumar07"
license: "MIT"
sdk: "fastapi"
entrypoint: "server:app"
server:
  port: 7860
  routes:
    reset: "/reset"
    step: "/step"
    state: "/state"
    health: "/health"
tasks:
  - id: "skill_gap_identifier"
    name: "Skill Gap Identifier"
    difficulty: "Easy"
  - id: "course_recommender"
    name: "Course Recommender"
    difficulty: "Medium"
  - id: "full_optimizer"
    name: "Full Roadmap Optimizer"
    difficulty: "Hard"
  - id: "pm_scheme_matcher"
    name: "PM Scheme Matcher"
    difficulty: "Medium-Hard"
tags:
  - career-coaching
  - openenv
  - edtech
sdg_alignment:
  - sdg: "Goal 8"
    description: "Decent Work and Economic Growth by closing the skill gap."
